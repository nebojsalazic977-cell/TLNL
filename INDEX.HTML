<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>

    body { font-family: Arial; background:#f5f5f5; padding:20px; }

    .card {
      background:white;
      padding:15px;
      margin-bottom:15px;
      border-radius:10px;
    }

    button {
      padding:8px;
      margin-top:5px;
      cursor:pointer;
    }

    .danger { background:red; color:white; }

  </style>
</head>

<body>

<h2 id="title">BOKS</h2>

<div id="login">
  <input type="password" id="pass">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

  <div class="card" id="prostor"></div>

  <div class="card" id="higijena"></div>

  <div class="card">

    <h3>Psi u boksu</h3>
    <div id="psi"></div>

    <h3>Dodaj psa</h3>
    <select id="dogSelect"></select>
    <button onclick="addDog()">Dodaj u boks</button>

  </div>

</div>

<script>

let USER = null;

function login() {

  google.script.run.withSuccessHandler(res => {

    if (!res.ok) {
      alert("Pogrešna šifra");
      return;
    }

    USER = res.user;
    sessionStorage.setItem("user", USER);

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    load();

  }).loginUser(document.getElementById("pass").value);
}

function load() {

  google.script.run.withSuccessHandler(renderProstor).getProstor(PROSTOR_ID);
  google.script.run.withSuccessHandler(renderHigijena).getHigijena(PROSTOR_ID);
  google.script.run.withSuccessHandler(renderPsi).getPsi(PROSTOR_ID);
  google.script.run.withSuccessHandler(fillDogs).getAvailableDogs(PROSTOR_ID);
}

function renderProstor(p){
  document.getElementById("prostor").innerHTML =
  `<b>${p.oznaka}</b><br>
   Tip: ${p.tip}<br>
   Površina: ${p.povrsina}`;
}

function renderHigijena(h){

  let html = "<h3>Higijena</h3>";

  if(h.last){
    html += `<b>Poslednje:</b> ${h.last.tip} (${h.last.datum})<br><hr>`;
  }

  html += "<b>Istorija:</b><br>";

  h.history.forEach(x=>{
    html += `${x.datum} - ${x.tip}<br>`;
  });

  document.getElementById("higijena").innerHTML = html;
}

function renderPsi(list){

  let html="";

  list.forEach(p=>{

    html += `
      <div>
        <b>${p.ime}</b><br>
        ${p.datumUlaska}<br>

        <button class="danger" onclick="exitDog('${p.pasId}')">
          Izlaz
        </button>
      </div>
      <hr>
    `;
  });

  document.getElementById("psi").innerHTML = html;
}

function fillDogs(list){

  let sel = document.getElementById("dogSelect");
  sel.innerHTML = "";

  list.forEach(d=>{
    sel.innerHTML += `<option value="${d.id}">${d.ime}</option>`;
  });
}

function exitDog(id){

  google.script.run.withSuccessHandler(load)
  .dogExit(id, PROSTOR_ID, USER);
}

function addDog(){

  let id = document.getElementById("dogSelect").value;

  google.script.run.withSuccessHandler(load)
  .dogEnter(id, PROSTOR_ID, USER);
}

</script>

</body>
</html>
